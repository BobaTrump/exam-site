<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Exam Tester</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="background"></div>
    <div class="emoji-cloud" aria-hidden="true"></div>
    <div class="sticker-cloud" aria-hidden="true">
      <img src="./cat-blue.png" alt="" />
      <img src="./cat-strawberry.png" alt="" />
      <img src="./cat-heart.png" alt="" />
      <img src="./cat-face.png" alt="" />
      <img src="./flowers.png" alt="" />
      <img src="./bear-gift.png" alt="" />
    </div>
    <button id="notes-mini-toggle" class="notes-mini-toggle ghost-button" type="button">📝 Заметки</button>
    <aside id="notes-mini-panel" class="notes-mini-panel hidden">
      <div class="notes-mini-head">
        <strong>Мои заметки</strong>
        <button id="notes-mini-close" class="ghost-button" type="button">×</button>
      </div>
      <textarea
        id="notes-mini-text"
        class="notes-mini-text"
        placeholder="Пиши сюда краткие мысли, формулы, правила..."
      ></textarea>
    </aside>
    <main class="app">
      <header class="topbar">
        <h1>Экзаменационный тест</h1>
        <div class="topbar-actions">
          <span id="stars-badge" class="stars-badge"><img src="./star-icon.png" alt="" /><span id="stars-count">0</span></span>
          <button id="reset-progress-btn" class="ghost-button" type="button" title="Сбросить прогресс">↻</button>
          <button id="theme-toggle" class="ghost-button" type="button">Тема</button>
        </div>
      </header>

      <section class="card pomodoro-card">
        <div class="pomodoro-left">
          <h2>Pomodoro</h2>
          <p id="pomodoro-phase" class="pomodoro-phase">Фокус</p>
          <p id="pomodoro-time" class="pomodoro-time">25:00</p>
          <div class="pomodoro-setup">
            <label>Фокус (мин): <input id="focus-minutes" type="number" min="1" max="180" value="25" /></label>
            <label>Перерыв (мин): <input id="break-minutes" type="number" min="1" max="60" value="5" /></label>
            <button id="pomodoro-apply" class="ghost-button" type="button">Применить</button>
          </div>
          <div class="pomodoro-controls">
            <button id="pomodoro-start" class="primary-button" type="button">Старт</button>
            <button id="pomodoro-pause" class="ghost-button" type="button">Пауза</button>
            <button id="pomodoro-reset" class="ghost-button" type="button">Сброс</button>
          </div>
          <p class="pomodoro-note">Цикл: 25 минут фокус / 5 минут перерыв</p>
        </div>
        <div class="pomodoro-video">
          <iframe
            src="https://www.youtube.com/embed/jfKfPfyJRdk?si=1XQgq1EaWJ1y5HVv"
            title="YouTube video player"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
            referrerpolicy="strict-origin-when-cross-origin"
            allowfullscreen
          ></iframe>
        </div>
      </section>

      <section class="card notes-card">
        <div class="notes-head">
          <h2>Конспекты PDF</h2>
          <input id="notes-search" class="notes-search" type="search" placeholder="Поиск по названию…" />
          <select id="notes-tag-filter" class="notes-tag-filter">
            <option value="">Все теги</option>
          </select>
          <label class="ghost-button" for="notes-upload">Добавить PDF</label>
          <input id="notes-upload" type="file" accept="application/pdf" multiple />
        </div>
        <div id="notes-list" class="notes-list"></div>
      </section>

      <section id="status-card" class="card status-card">
        <p id="status-text">Загрузка PDF...</p>
      </section>

      <section id="quiz-card" class="card hidden">
        <div class="quiz-header">
          <p id="progress-text">0 / 0</p>
          <div class="progress-track">
            <div id="progress-bar" class="progress-bar"></div>
          </div>
        </div>

        <h2 id="question-text"></h2>
        <div class="quiz-tools">
          <button id="favorite-btn" class="ghost-button" type="button">☆ В избранное</button>
          <button id="favorites-mode-btn" class="ghost-button" type="button">Только избранные: выкл</button>
          <input id="random-count" type="number" min="1" max="198" value="20" class="random-count-input" />
          <button id="random-test-btn" class="ghost-button" type="button">Случайный тест</button>
          <button id="all-test-btn" class="ghost-button" type="button">Все 198</button>
        </div>
        <div id="answers" class="answers"></div>
        <p id="feedback" class="feedback"></p>
        <button id="check-btn" class="primary-button hidden" type="button">Проверить</button>
        <button id="next-btn" class="primary-button hidden" type="button">Далее</button>
      </section>

      <section id="result-card" class="card hidden">
        <h2>Тест завершён</h2>
        <p id="result-correct"></p>
        <p id="result-percent"></p>
        <button id="restart-btn" class="primary-button" type="button">Пройти заново</button>
      </section>
    </main>

    <button id="kitty-popup" class="kitty-popup hidden" type="button" title="Поймай меня! +1 звезда">
      <img src="./star-kitten.png" alt="Котёнок со звездой" />
    </button>
    <div id="pdf-viewer-modal" class="pdf-viewer-modal hidden">
      <div class="pdf-viewer-topbar">
        <button id="pdf-viewer-close" class="ghost-button" type="button">Закрыть</button>
      </div>
      <iframe id="pdf-viewer-frame" title="Просмотр PDF"></iframe>
    </div>

    <div id="notes-editor-modal" class="pdf-viewer-modal hidden">
      <div class="pdf-viewer-topbar">
        <button id="notes-editor-close" class="ghost-button" type="button">Закрыть</button>
      </div>
      <div class="card notes-editor-card">
        <h3 class="notes-editor-title">Редактирование конспекта</h3>
        <label class="notes-editor-label">
          Название
          <input id="notes-editor-name" class="notes-editor-input" type="text" />
        </label>
        <label class="notes-editor-label">
          Теги (через запятую)
          <input id="notes-editor-tags" class="notes-editor-input" type="text" placeholder="например: семья, санкции" />
        </label>
        <div class="notes-editor-actions">
          <button id="notes-editor-save" class="primary-button" type="button">Сохранить</button>
          <button id="notes-editor-cancel" class="ghost-button" type="button">Отмена</button>
        </div>
      </div>
    </div>
    <div id="toast-stack" class="toast-stack" aria-live="polite"></div>
    <div id="fx-layer" class="fx-layer" aria-hidden="true"></div>

    <script type="module" src="./script.js"></script>
  </body>
</html>
